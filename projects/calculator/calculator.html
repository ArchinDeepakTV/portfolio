<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="calcs.css" />
    <script src="calc.js"></script>
  </head>
  <body>
    <h1
      style="
        text-align: center;
        text-transform: uppercase;
        border: 3px inset mediumseagreen;
      "
    >
      Calculator
    </h1>
    <label class="switch">
      <input type="checkbox" id="myCheck" onclick="myFunction()" />
      <span class="slider round"></span>
    </label>
    <form action="/url" method="get">
      <input
        id="inQuery"
        style="
          text-align: center;
          display: block;
          margin-left: 30%;
          margin-top: 2%;
          height: 8vh;
          width: 40%;
        "
        type="text"
        placeholder="enter here"
        autofocus
      />
      <button
        style="margin-left: 46%; margin-top: 2%"
        type="submit"
        onclick="queryFunction()"
      >
        Submit
      </button>
    </form>
    <p
      id="outCal"
      style="
        display: none;
        text-align: center;
        margin-top: 10%;
        border: 3px inset white;
      "
    ></p>
    <p id="text" style="display: none">Checkbox is CHECKED!</p>
  </body>
</html>
